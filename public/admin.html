<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-store" />
<title>Saffron Stay — Staff Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1230;--violet:#7b4dff;--v2:#5a32d6;--bg:#f5f3ff;--card:#fff;--muted:#6b6480;--line:#e7e2f7}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:1080px;margin:0 auto;padding:0 18px}
header{background:linear-gradient(135deg,#1a1230,#7b4dff);color:#fff;padding:16px 0}
.nav{display:flex;justify-content:space-between;align-items:center}
.brand{font-weight:900;font-size:20px;display:flex;gap:8px;align-items:center}
.nav a{color:#fff;text-decoration:none;background:rgba(255,255,255,.15);padding:7px 13px;border-radius:9px;font-size:13px;font-weight:600}
.stats{display:flex;gap:14px;margin:24px 0;flex-wrap:wrap}
.stat{flex:1;min-width:140px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
.stat b{font-size:26px;font-weight:900;display:block;color:var(--v2)}.stat span{font-size:12px;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px;overflow:auto}
h2{font-size:18px;margin-bottom:8px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
th{color:var(--muted);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:#efeaff;color:var(--v2)}
button.act{background:var(--violet);color:#fff;border:none;border-radius:8px;padding:6px 11px;font-weight:700;cursor:pointer;font-size:12px}
footer{color:var(--muted);font-size:13px;text-align:center;padding:24px 0}
</style>
</head>
<body>
<header><div class="wrap nav"><div class="brand">🏨 Saffron Stay — Staff</div><a href="http://129.121.122.53:8080/">← Portal</a></div></header>
<div class="wrap">
  <div class="stats" id="stats"></div>
  <div class="card"><h2>Today's Bookings</h2><table id="bt"><thead><tr><th>Guest</th><th>Phone</th><th>Room</th><th>Check-in</th><th>Check-out</th><th>Guests</th><th>Status</th><th></th></tr></thead><tbody></tbody></table></div>
  <div class="card"><h2>Enquiries</h2><table id="et"><thead><tr><th>Name</th><th>Phone</th><th>Message</th></tr></thead><tbody></tbody></table></div>
</div>
<footer>Saffron Stay · Staff Dashboard · Powered by Nihon Offshore AI</footer>
<script>
async function load(){
  const a=await (await fetch('/api/bookings',{headers:{'x-auth-token':(document.cookie.match(/dash=([^;]+)/)||[])[1]||''}})).json();
  const e=await (await fetch('/api/enquiries',{headers:{'x-auth-token':(document.cookie.match(/dash=([^;]+)/)||[])[1]||''}})).json();
  const st=await (await fetch('/api/stats')).json();
  stats.innerHTML=`<div class="stat"><b>${st.rooms}</b><span>Room types</span></div><div class="stat"><b>${st.bookings}</b><span>Bookings today</span></div><div class="stat"><b>${st.enquiries}</b><span>Enquiries today</span></div>`;
  bt.querySelector('tbody').innerHTML=a.map(r=>`<tr><td><b>${r.guest}</b></td><td>${r.phone}</td><td>${r.room||'-'} <span style="color:var(--muted)">(${r.type||''})</span></td><td>${r.checkin||'-'}</td><td>${r.checkout||'-'}</td><td>${r.guests||2}</td><td><span class="badge">${r.status}</span></td><td><button class="act" onclick="done(${r.id})">Done</button></td></tr>`).join('');
  et.querySelector('tbody').innerHTML=e.map(r=>`<tr><td><b>${r.name}</b></td><td>${r.phone}</td><td style="color:var(--muted)">${r.message||'-'}</td></tr>`).join('');
}
async function done(id){await fetch('/api/booking/status',{method:'POST',headers:{'Content-Type':'application/json','x-auth-token':(document.cookie.match(/dash=([^;]+)/)||[])[1]||''},body:JSON.stringify({id,status:'checked-out'})});load();}
load();setInterval(load,15000);
</script>
</body>
</html>
